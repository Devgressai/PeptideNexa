name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Public env used by `lib/env.ts` at module load. Non-sensitive defaults
    # so the build runs without a real DB. Loader-level error handling makes
    # pages render empty rather than crashing.
    env:
      NEXT_PUBLIC_SITE_URL: https://peptidenexa.com
      NEXT_PUBLIC_SITE_NAME: PeptideNexa

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
